name: Java CI with Gradle

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Run tests
        run: ./gradlew test

      - name: Generate JaCoCo Report
        run: ./gradlew jacocoTestReport

      - name: Read previous coverage from badges
        id: prev_coverage
        run: |
          PREV_BRANCH=0
          PREV_CODE=0
          if [ -f ".github/badges/branches.svg" ]; then
            PREV_BRANCH=$(grep -oP '>\K[0-9.]+(?=%)' .github/badges/branches.svg | head -1 || echo "0")
          fi
          if [ -f ".github/badges/jacoco.svg" ]; then
            PREV_CODE=$(grep -oP '>\K[0-9.]+(?=%)' .github/badges/jacoco.svg | head -1 || echo "0")
          fi
          echo "prev_branch=$PREV_BRANCH" >> $GITHUB_OUTPUT
          echo "prev_code=$PREV_CODE" >> $GITHUB_OUTPUT
          echo "Previous branch coverage: $PREV_BRANCH%"
          echo "Previous code coverage: $PREV_CODE%"

      - name: Generate JaCoCo Badge
        id: jacoco
        uses: cicirello/jacoco-badge-generator@v2
        with:
          generate-branches-badge: true
          jacoco-csv-file: build/reports/jacoco/test/jacocoTestReport.csv
          badges-directory: .github/badges

      - name: Check coverage regression
        run: |
          CURRENT_BRANCH=${{ steps.jacoco.outputs.branches }}
          CURRENT_CODE=${{ steps.jacoco.outputs.coverage }}
          PREV_BRANCH=${{ steps.prev_coverage.outputs.prev_branch }}
          PREV_CODE=${{ steps.prev_coverage.outputs.prev_code }}
          
          echo "Current branch coverage: $CURRENT_BRANCH%"
          echo "Current code coverage: $CURRENT_CODE%"
          echo "Previous branch coverage: $PREV_BRANCH%"
          echo "Previous code coverage: $PREV_CODE%"
          
          # Fail if branch coverage dropped
          if (( $(echo "$CURRENT_BRANCH < $PREV_BRANCH" | bc -l) )); then
            echo "ERROR: Branch coverage dropped from $PREV_BRANCH% to $CURRENT_BRANCH%!"
            exit 1
          fi
          
          # Fail if code coverage dropped
          if (( $(echo "$CURRENT_CODE < $PREV_CODE" | bc -l) )); then
            echo "ERROR: Code coverage dropped from $PREV_CODE% to $CURRENT_CODE%!"
            exit 1
          fi
          
          echo "Coverage check passed!"

      - name: Commit badge
        if: github.event_name == 'push'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull --rebase origin main || true
          git add .github/badges/
          git commit -m "Update coverage badges" || echo "No changes to commit"
          git push

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ci-helloworld:latest